<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>M3U8 基因探伤仪 (时间轴进度 + 筛选版)</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f5f5f7; color: #333; }
        .container { max-width: 1300px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
        input[type="text"] { flex: 1; min-width: 300px; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
        button { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; }
        .btn-analyze { background-color: #007aff; }
        .btn-probe { background-color: #722ed1; display: none; } 
        
        select { padding: 11px; border-radius: 6px; border: 1px solid #ddd; font-size: 14px; outline: none; background: #fff; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { text-align: left; padding: 12px 10px; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; position: sticky; top: 0; z-index: 10; font-size: 14px;}
        
        .row-normal { transition: background 0.2s; }
        .row-normal:hover { background-color: #f8f9fa; }
        .row-ad { background-color: #fff0f0; border-left: 4px solid #ff4d4f; }
        
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; display: inline-block; }
        .badge-safe { background: #e8f5e9; color: #2e7d32; }
        .badge-danger { background: #ffebee; color: #c62828; }
        .badge-warning { background: #fffbe6; color: #faad14; }
        
        #stats { margin-top: 15px; font-size: 14px; background: #f8f9fa; padding: 15px; border-radius: 6px; display: none; border: 1px solid #e9ecef;}
        #log { margin-top: 10px; font-size: 12px; max-height: 120px; overflow-y: auto; background: #282c34; color: #abb2bf; padding: 10px; border-radius: 6px; display: none; font-family: monospace; }
        .block-info { color: #888; font-size: 11px; margin-top: 4px; }
        
        /* 针对时间进度的特殊醒目样式 */
        .time-col { color: #007aff; font-family: monospace; font-size: 16px; font-weight: 900; }
    </style>
</head>
<body>

<div class="container">
    <h2>M3U8切片广告探测</h2>
    
    <div class="input-group">
        <input type="text" id="m3u8Url" placeholder="输入 M3U8 地址...">
        <button class="btn-analyze" onclick="processM3u8()">1. 基础解析</button>
        <button class="btn-probe" id="probeBtn" onclick="startGeneProbe()">2. 🧬 开启基因提取</button>
        
        <select id="filterSelect" onchange="applyFilter()">
            <option value="all">👁️ 显示所有片段</option>
            <option value="normal">✅ 只看正常正片</option>
            <option value="ad">❌ 只看疑似广告</option>
        </select>
    </div>

    <div id="stats"></div>
    <div id="log"></div>
    
    <table>
        <thead>
            <tr>
                <th width="5%">序号</th>
                <th width="12%">⏱️影片进度</th>  <th width="13%">所属区块</th>
                <th width="8%">切片时长</th>
                <th width="32%">TS 切片地址</th>
                <th width="15%">底层分辨率</th>
                <th width="15%">基因研判</th>
            </tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>
</div>

<script>
    let globalBlocks = []; 
    let baseResolution = null; 

    // 将秒数转换为 00:00 格式
    function formatTime(seconds) {
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
        const s = Math.floor(seconds % 60).toString().padStart(2, '0');
        return h > 0 ? `${h}:${m}:${s}` : `${m}:${s}`;
    }

    function logMsg(msg) {
        const logEl = document.getElementById('log');
        logEl.style.display = 'block';
        logEl.innerHTML += `<div>> ${msg}</div>`;
        logEl.scrollTop = logEl.scrollHeight;
    }

    async function processM3u8() {
        const url = document.getElementById('m3u8Url').value.trim();
        if (!url) return alert("请输入地址");
        
        document.getElementById('resultBody').innerHTML = '';
        document.getElementById('log').innerHTML = '';
        globalBlocks = [];
        baseResolution = null;
        document.getElementById('filterSelect').value = 'all'; 
        
        try {
            const response = await fetch(url);
            const text = await response.text();
            
            // 处理一级 M3U8
            if (text.includes('#EXT-X-STREAM-INF')) {
                const lines = text.split('\n');
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].includes('#EXT-X-STREAM-INF')) {
                        document.getElementById('m3u8Url').value = new URL(lines[i+1].trim(), url).href;
                        processM3u8();
                        return;
                    }
                }
            }

            // 按断层划分区块并记录进度
            const lines = text.split('\n');
            let currentBlock = { id: 0, duration: 0, segments: [] };
            let currentDuration = 0;
            let cumulativeTime = 0; // 这是记录进度的核心变量

            for (let line of lines) {
                line = line.trim();
                if (line === '#EXT-X-DISCONTINUITY') {
                    if (currentBlock.segments.length > 0) globalBlocks.push(currentBlock);
                    currentBlock = { id: globalBlocks.length, duration: 0, segments: [] };
                    continue;
                }
                if (line.startsWith('#EXTINF:')) {
                    currentDuration = parseFloat(line.split(':')[1].split(',')[0]);
                } else if (!line.startsWith('#') && line !== '') {
                    currentBlock.segments.push({
                        uri: line.startsWith('http') ? line : new URL(line, url).href,
                        duration: currentDuration,
                        startTime: cumulativeTime, // 把当前进度存起来
                        resolution: null
                    });
                    currentBlock.duration += currentDuration;
                    cumulativeTime += currentDuration; // 累加时间推移
                    currentDuration = 0;
                }
            }
            if (currentBlock.segments.length > 0) globalBlocks.push(currentBlock);

            renderTable();
            
            let totalSegments = globalBlocks.reduce((acc, block) => acc + block.segments.length, 0);
            document.getElementById('stats').style.display = 'block';
            document.getElementById('stats').innerHTML = `共解析出 <strong>${globalBlocks.length}</strong> 个区块，<strong>${totalSegments}</strong> 个切片。视频总长: <strong>${formatTime(cumulativeTime)}</strong>`;
            document.getElementById('probeBtn').style.display = 'block';
            document.getElementById('probeBtn').disabled = false;
            document.getElementById('probeBtn').innerText = '2. 🧬 开启基因提取';

        } catch (error) {
            alert(`获取失败: ${error.message}`);
        }
    }

    function renderTable() {
        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';
        
        let globalIndex = 1;
        globalBlocks.forEach((block) => {
            block.segments.forEach((seg, i) => {
                let statusHtml = '<span class="badge badge-warning">待比对</span>';
                let rowClass = 'row-normal';
                
                if (baseResolution && seg.resolution) {
                    if (seg.resolution !== baseResolution) {
                        statusHtml = `<span class="badge badge-danger">变异实锤: 比例异常</span>`;
                        rowClass = 'row-ad';
                    } else {
                        statusHtml = '<span class="badge badge-safe">基因吻合 (正片)</span>';
                    }
                }

                const tr = document.createElement('tr');
                tr.className = rowClass; 
                
                const blockCell = i === 0 ? 
                    `<strong>[区块 ${block.id}]</strong><div class="block-info">总长: ${block.duration.toFixed(1)}s</div>` : 
                    `<span style="color:#ccc;">同上</span>`;
                
                // 这里生成表格的 7 个列，必须和 thead 一一对应
                tr.innerHTML = `
                    <td>${globalIndex++}</td>
                    <td class="time-col">${formatTime(seg.startTime)}</td> <td>${blockCell}</td>
                    <td>${seg.duration.toFixed(2)}s</td>
                    <td><div style="width:280px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${seg.uri}">${seg.uri}</div></td>
                    <td>${seg.resolution || '-'}</td>
                    <td>${statusHtml}</td>
                `;
                tbody.appendChild(tr);
            });
        });

        applyFilter(); // 渲染完保持筛选状态
    }

    function applyFilter() {
        const filterValue = document.getElementById('filterSelect').value;
        const rows = document.querySelectorAll('#resultBody tr');
        
        rows.forEach(row => {
            if (filterValue === 'all') {
                row.style.display = '';
            } else if (filterValue === 'normal') {
                row.style.display = row.classList.contains('row-normal') ? '' : 'none';
            } else if (filterValue === 'ad') {
                row.style.display = row.classList.contains('row-ad') ? '' : 'none';
            }
        });
    }

    function extractResolution(tsUrl) {
        return new Promise((resolve) => {
            const fakeM3u8 = `#EXTM3U\n#EXT-X-VERSION:3\n#EXT-X-TARGETDURATION:10\n#EXTINF:10.000,\n${tsUrl}\n#EXT-X-ENDLIST`;
            const blob = new Blob([fakeM3u8], { type: 'application/vnd.apple.mpegurl' });
            const blobUrl = URL.createObjectURL(blob);

            const video = document.createElement('video');
            video.muted = true; 
            
            const hls = new Hls({ enableWorker: false, debug: false });
            
            const timeoutId = setTimeout(() => {
                hls.destroy();
                URL.revokeObjectURL(blobUrl);
                resolve('解析超时');
            }, 6000);

            video.addEventListener('loadedmetadata', () => {
                clearTimeout(timeoutId);
                const res = `${video.videoWidth} x ${video.videoHeight}`;
                hls.destroy();
                URL.revokeObjectURL(blobUrl);
                resolve(res);
            });

            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    clearTimeout(timeoutId);
                    hls.destroy();
                    URL.revokeObjectURL(blobUrl);
                    resolve('流媒体错误');
                }
            });

            hls.loadSource(blobUrl);
            hls.attachMedia(video);
        });
    }

    async function startGeneProbe() {
        document.getElementById('probeBtn').disabled = true;
        document.getElementById('probeBtn').innerText = '🧬 基因提取中...';
        logMsg("启动基因提取引擎...");
        
        let longestBlock = globalBlocks.reduce((prev, current) => (prev.segments.length > current.segments.length) ? prev : current);
        logMsg(`正在提取正片基准基因 (提取自区块 ${longestBlock.id})...`);
        
        baseResolution = await extractResolution(longestBlock.segments[0].uri);
        logMsg(`✅ 正片基准分辨率确立为: <strong style="color:#52c41a;">${baseResolution}</strong>`);
        document.getElementById('stats').innerHTML += `<br>正片基准分辨率: <strong style="color:#007aff;">${baseResolution}</strong>`;

        for (let block of globalBlocks) {
            logMsg(`正在嗅探 区块 [${block.id}] 的基因...`);
            const suspectRes = await extractResolution(block.segments[0].uri);
            
            block.segments.forEach(seg => seg.resolution = suspectRes);
            
            if (suspectRes !== baseResolution) {
                logMsg(`<span style="color:#ff4d4f;">❌ 发现变异基因！区块 [${block.id}] 分辨率为 ${suspectRes}，判定为广告！</span>`);
            } else {
                logMsg(`<span style="color:#52c41a;">✅ 区块 [${block.id}] 基因正常。</span>`);
            }
            
            renderTable();
        }

        document.getElementById('probeBtn').innerText = '✅ 基因比对完成';
        logMsg("分析结束。你可以使用顶部的下拉菜单进行广告过滤了。");
    }
</script>

</body>
</html>
